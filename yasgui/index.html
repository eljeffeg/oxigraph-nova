<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Oxigraph Nova — YASGUI</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/yasgui@2.7.29/dist/yasgui.min.css" />
  <style>
    html, body { margin: 0; height: 100%; }
    #yasgui { height: 100%; }
  </style>
</head>
<body>
  <div id="yasgui"></div>
  <script src="https://cdn.jsdelivr.net/npm/yasgui@2.7.29/dist/yasgui.min.js"></script>
  <script>
    // Defaults to the `nova-serve` endpoint exposed by docker-compose.yml on
    // the host at localhost:3030. Override at runtime via ?endpoint=<url> if
    // querying a different Nova instance.
    const params = new URLSearchParams(window.location.search);
    const endpoint = params.get("endpoint") || "http://localhost:3030/sparql";

    const yasgui = new YASGUI(document.getElementById("yasgui"), {
      requestConfig: { endpoint: endpoint },
      copyEndpointOnNewTab: true,
    });
  </script>
</body>
</html>
