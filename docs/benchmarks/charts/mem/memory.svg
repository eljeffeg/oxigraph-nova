<svg xmlns="http://www.w3.org/2000/svg" width="640" height="320" viewBox="0 0 640 320" role="img" aria-label="Memory Usage (Physical Footprint)">
<title>Memory Usage (Physical Footprint)</title>
<style>
  .title { fill: #111827; }
  .muted { fill: #6b7280; }
  .label { fill: #374151; }
  .grid  { stroke: #e5e7eb; stroke-width: 1; }
  .axis  { stroke: #9ca3af; stroke-width: 1; }
  @media (prefers-color-scheme: dark) {
    .title { fill: #f3f4f6; }
    .muted { fill: #9ca3af; }
    .label { fill: #d1d5db; }
    .grid  { stroke: #374151; }
    .axis  { stroke: #6b7280; }
  }
</style>
<text class="title" x="320.0" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600">Memory Usage (Physical Footprint)</text>
<text class="muted" x="320.0" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11">lower is better</text>
<line class="grid" x1="56" y1="256.0" x2="616" y2="256.0"/>
<text class="muted" x="48" y="260.0" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11">0.00</text>
