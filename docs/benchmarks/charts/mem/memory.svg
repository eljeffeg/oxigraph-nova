<text class="label" x="138.9" y="274" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12">Nova (louds)</text>
<rect x="221.8" y="253.9" width="31.4" height="2.1" fill="#7c3aed" rx="3"/>
