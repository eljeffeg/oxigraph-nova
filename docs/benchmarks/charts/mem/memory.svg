<text class="muted" x="48" y="104.0" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11">6000</text>
<line class="grid" x1="56" y1="48.0" x2="616" y2="48.0"/>
<text class="muted" x="48" y="52.0" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11">8000 MiB</text>
<line class="axis" x1="56" y1="48" x2="56" y2="256"/>
<line class="axis" x1="56" y1="256" x2="616" y2="256"/>
