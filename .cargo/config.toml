# ── Per-architecture codegen flags ─────────────────────────────────────────────
#
# Rust equivalents of the C++ -march / -fuse-ld=lld build flags.
# See CLAUDE.md "Build Configuration" for rationale.
#
# PORTABLE FLOOR (committed default):
#   x86_64  → -C target-cpu=x86-64-v3   (AVX2 + FMA + BMI2 + popcnt; Haswell 2013+, Zen1 2017+)
#   aarch64 → -C target-feature=+dotprod,+aes,+sha2  (Graviton2 / Neoverse N1 / Ampere Altra 2018+)
#
# LOCAL BENCHMARKING OVERRIDE (not committed):
#   RUSTFLAGS="-C target-cpu=native" cargo bench
#   This gives the absolute maximum on the build machine (e.g. 2-3x vers-vecs select speedup
#   via BMI2 pdep/pext + popcnt) but produces non-portable binaries.
#
# LLD LINKER (Linux targets only):
#   -fuse-ld=lld via "link-arg=-fuse-ld=lld" on the explicit linux triples below.
#   macOS uses ld64 by default; the cfg(target_arch) blocks apply there without lld.
#
# NOTE — cfg vs explicit-triple precedence:
#   When both a cfg(...) block and an explicit [target.<triple>] block match, Cargo
#   applies ONLY the explicit triple block. The Linux triple blocks therefore repeat
#   the target-cpu/feature flags so they take effect on CI/deploy hosts.

# ── macOS / Windows / any non-Linux x86_64 ─────────────────────────────────────
# The cfg block applies when no explicit triple block matches (i.e. macOS, Windows).
[target.'cfg(target_arch = "x86_64")']
rustflags = ["-C", "target-cpu=x86-64-v3"]

# ── macOS / non-Linux aarch64 (your dev machine: Apple Silicon) ─────────────────
[target.'cfg(target_arch = "aarch64")']
rustflags = ["-C", "target-feature=+dotprod,+aes,+sha2"]

# ── Linux x86_64 (CI / deploy) — includes lld linker ───────────────────────────
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = [
    "-C", "target-cpu=x86-64-v3",
    "-C", "link-arg=-fuse-ld=lld",
]

# ── Linux aarch64 (Graviton2 / Ampere — CI / deploy) — includes lld linker ─────
[target.aarch64-unknown-linux-gnu]
linker = "clang"
rustflags = [
    "-C", "target-feature=+dotprod,+aes,+sha2",
    "-C", "link-arg=-fuse-ld=lld",
]
