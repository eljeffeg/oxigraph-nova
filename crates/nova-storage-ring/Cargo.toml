[package]
name        = "oxigraph-nova-storage-ring"
description = "Production six-order LOUDS RingStore + Braided Ring pilot (cyclic QWT / NOVARNG1 / D2)"
version.workspace    = true
edition.workspace    = true
license.workspace    = true
repository.workspace = true

[features]
default = ["mmap"]
# Opt-in Tantivy-backed full-text search (see `crates/nova-fulltext`),

# indexed incrementally on RingStore's compaction cycle. Zero-cost when
# disabled: no tantivy dependency is even compiled in.
fulltext     = ["dep:oxigraph-nova-fulltext"]
# Research-only DROP-branch APIs (D3/D4/E1 counters, C1/prefetch mutation knobs).
diagnostics  = []
# Braided Ring pilot: cyclic QWT + NOVARNG1 + D2. Not on RingStore SPARQL path.
cyclic-ring-pilot = ["dep:qwt", "dep:memmap2"]
# See `oxigraph-nova-core`'s `mmap` feature doc comment. Gates
# `snapshot.rs`'s `load_mmap`-based functions, used by `RingStore::open`'s
# disk-backed recovery path and `commit_compaction`'s persistent-store
# branch. Disabled (via `default-features = false`) for the wasm32 build
# (`oxigraph-nova-js`), which is in-memory-only and never calls
# `RingStore::open`.
mmap = ["epserde/mmap", "sux/mmap", "oxigraph-nova-core/mmap", "oxigraph-nova-storage-common/mmap"]

[dependencies]
oxigraph-nova-core = { path = "../nova-core", default-features = false }
oxigraph-nova-storage-common = { path = "../nova-storage-common", default-features = false } # generic WAL/MANIFEST/dict-persistence machinery (backend-agnostic)
oxigraph-nova-fulltext = { path = "../nova-fulltext", optional = true }
oxrdf         = { workspace = true }
anyhow        = { workspace = true }
thiserror     = { workspace = true }
tracing       = { workspace = true }
parking_lot   = { workspace = true }
sux           = { version = "0.14", default-features = false, features = ["epserde"] } # T backend (Rank9+SelectAdapt), L array (BitFieldVec); epserde+mmap for mmap-based snapshot persistence

value-traits  = "0.2.0"  # SliceByValue::index_value for safe BitFieldVec reads
mem_dbg       = "0.4"     # MemSize trait — sux's Rank9/SelectAdapt/BitFieldVec already derive it;
                           # used for real per-component memory-breakdown diagnostics.
epserde       = { version = "0.12.5", default-features = false, features = ["derive", "std"] } # mmap snapshot format for LoudsTrie T/L arrays; see `mmap` feature above


# Braided Ring substrate (optional; feature `cyclic-ring-pilot`).
qwt     = { version = "0.4.0", optional = true }
memmap2 = { version = "0.9", optional = true }

[dev-dependencies]
pretty_assertions = { workspace = true }
