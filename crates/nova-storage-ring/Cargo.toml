[package]
name        = "oxigraph-nova-storage-ring"
description = "CompactLTJ LOUDS trie index (6 orderings, O(1) navigation) + LSM delta for Oxigraph Nova"
version.workspace    = true
edition.workspace    = true
license.workspace    = true
repository.workspace = true

[features]
# Elias-Fano O(1) succ() for high-degree sidecar nodes (A/B benchmarking).
# Overrides the adaptive threshold to force EF for all sidecar nodes.
# Usage: cargo bench -p oxigraph-nova-bench --features l-opt-ef -- large/feature_lookup
l-opt-ef     = []

[dependencies]
oxigraph-nova-core = { path = "../nova-core" }
oxigraph-nova-storage-common = { path = "../nova-storage-common" } # generic WAL/MANIFEST/dict-persistence machinery (backend-agnostic)
oxrdf         = { workspace = true }
anyhow        = { workspace = true }
thiserror     = { workspace = true }
sux           = { version = "0.14", features = ["epserde", "mmap"] } # T backend (Rank9+SelectAdapt), L array (BitFieldVec); epserde+mmap for mmap-based snapshot persistence
value-traits  = "0.2.0"  # SliceByValue::index_value for safe BitFieldVec reads
mem_dbg       = "0.4"     # MemSize trait — sux's Rank9/SelectAdapt/BitFieldVec already derive it;
                           # used for real per-component memory-breakdown diagnostics.
epserde       = { version = "0.12.5", features = ["derive", "mmap", "std"] } # mmap snapshot format for LoudsTrie T/L arrays


[dev-dependencies]
pretty_assertions = { workspace = true }
